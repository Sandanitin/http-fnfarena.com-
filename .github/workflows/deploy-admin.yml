name: Deploy Admin Panel to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'fnf_admin_build/**'

jobs:
  deploy-admin:
    name: Deploy Admin Panel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy Admin via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}.lightcoral-ferret-563515.hostingersite.com
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: ./fnf_admin_build/dist/
          server-dir: /public_html/admin/
          exclude: |
            **/.git*
            **/.git*/**
