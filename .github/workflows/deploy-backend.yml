name: Deploy Backend to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'fnf_backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy Backend (CodeIgniter)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, mysqli, curl, gd, xml, dom, simplexml

      - name: Install Composer Dependencies
        working-directory: fnf_backend
        run: composer install --no-dev --optimize-autoloader

      - name: Create Production .env
        working-directory: fnf_backend
        run: |
          cat > .env << 'EOF'
          CI_ENVIRONMENT = production

          CORS_ALLOWED_ORIGINS=https://fnfarena.com,https://www.fnfarena.com,https://admin.fnfarena.com,https://cms.fnfarena.com
          CORS_ALLOW_CREDENTIALS=true

          app.baseURL = 'https://fnfarena.com/api'

          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION=28800

          # Cloudflare R2
          R2_ENDPOINT="${{ secrets.R2_ENDPOINT }}"
          R2_ACCESS_KEY="${{ secrets.R2_ACCESS_KEY }}"
          R2_SECRET_KEY="${{ secrets.R2_SECRET_KEY }}"
          R2_BUCKET="images"
          CDN_BASE_URL="${{ secrets.CDN_BASE_URL }}"

          database.default.hostname = localhost
          database.default.database = u205277930_fnf
          database.default.username = u205277930_fnf
          database.default.password = ${{ secrets.DB_PASSWORD }}
          database.default.DBDriver = MySQLi
          database.default.DBPrefix =
          database.default.port = 3306
          EOF

      - name: Package Backend Files into ZIP
        working-directory: fnf_backend
        run: |
          # Create unzip.php script
          cat > unzip.php << 'EOF'
          <?php
          $zipFile = 'backend.zip';
          if (!file_exists($zipFile)) {
              die("Zip file not found.");
          }
          $zip = new ZipArchive;
          if ($zip->open($zipFile) === TRUE) {
              $zip->extractTo(__DIR__);
              $zip->close();
              unlink($zipFile);
              unlink(__FILE__);
              echo "SUCCESS";
          } else {
              echo "FAILED";
          }
          EOF

          # Create zip
          zip -r backend.zip . -x "tests/*" -x "*.git*"

          # Move to deploy folder
          mkdir deploy_temp
          mv backend.zip deploy_temp/
          mv unzip.php deploy_temp/

      - name: Deploy Backend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 147.93.99.216
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: ./fnf_backend/deploy_temp/
          server-dir: /public_html/api/
          timeout: 600000

      - name: Trigger Remote Extraction
        run: |
          echo "Extracting backend.zip on the server..."
          response=$(curl -k -s https://fnfarena.com/api/unzip.php)
          echo "Server Response: $response"
          if [ "$response" != "SUCCESS" ]; then
            echo "Error: Extraction failed or unzip.php returned failure."
            exit 1
          fi
          echo "Extraction completed successfully!"

